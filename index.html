<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/style.css">
    <link rel="icon" type="image/x-icon" href="./assets/images/shop_screens.jpg">
</head>

<body>
    <section>
        <div class="container">
            <div class="row">
                <div class="box-1">
                    <div class="col-left-1">

                            A high-quality solution for those who want a beautiful startup website quickly
                        </h1>
                    </div>
                    <div class="col-left-2">
                        <form class="column">
                            <input class="email-input" type="email" id="email" placeholder="Your email" required>
                            <input class="password-input" type="password" name="password" placeholder=" your password">
                            <button class="btn" type="submit">Sign in</button>
                        </form>
                        <p class="para">
                            By signing up, you agree to the Terms of Service
                        </p>
                    </div>
                </div>

                <div class="box-2">
                    <div class="col-right">
                        <div class="img-box">
                            <img src="./assets/images/shop_screens.jpg" alt="shop_screens">
                            <div class="play-btn">
                                <svg width="16" height="18" viewBox="0 0 16 18" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M15.4464 9.07373L0.625 17.3103C0.453869 17.4071 0.30506 17.4182 0.178571 17.3438C0.0595238 17.2694 0 17.1355 0 16.942V0.513462C0 0.32001 0.0595238 0.186081 0.178571 0.111676C0.30506 0.0372713 0.453869 0.0484321 0.625 0.145159L15.4464 8.38177C15.6176 8.47849 15.7031 8.59382 15.7031 8.72775C15.7031 8.86168 15.6176 8.977 15.4464 9.07373Z"
                                        fill="white" />
                                </svg>

                            </div>
                        </div>
                        <p class="para-2">
                            We made it so beutiful and simple. It combines landings, pages, blogs and shop screens. It
                            is definitely the tool you need in your collection!
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
