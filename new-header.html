<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            text-decoration: none;
        }

        header {
            padding: 10px 0;
        }

        .container {
            max-width: 1180px;
            padding: 0 20px;
            margin: 0 auto;
        }

        .nav-list {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 16px;
        }



        .list {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-btn {
            padding: 10px 20px;
            background-color: skyblue;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
        }

        .list-2 {
            gap: 30px;
        }

        .menu-toggle {
            display: none;
        }

        @media (max-width : 767.98px) {
            .nav-list {
                position: fixed;
                top: 0;
                left: 100%;
                background-color: whitesmoke;
                width: 100%;
                height: 100%;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 10px;
                transition: all 300ms;
            }

            label[for="menu-checkbox"] {
                display: flex;
                flex-direction: column;
                gap: 4px;
                width: 24px;
                height: 20px;
                position: relative;
                z-index: 2;
                overflow: hidden;
            }

            .menu-lines {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 24px;
                border-radius: 8px;
                height: 4px;
                background-color: black;
                transition: all 300ms;
            }

            .center-line {
                position: relative;
            }

            .center-line::after {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                background-color: black;
                transition: all 300ms;
                border-radius: 8px;
            }

            .row {
                justify-content: space-between;
            }

            .list {
                flex-direction: column;
                gap: 10px;

            }

            .menu-toggle {
                display: flex;
            }


            input[id="menu-checkbox"]:checked~.nav-list {
                left: 0;
            }

            #menu-checkbox:checked~.menu-toggle .first-line {
                transform: translateX(-24px);
            }

            #menu-checkbox:checked~.menu-toggle .last-line {
                transform: translateX(24px);
            }

            #menu-checkbox:checked~.menu-toggle .center-line {
                transform: rotate(-45deg);
            }

            #menu-checkbox:checked~.menu-toggle .center-line::after {
                transform: rotate(-90deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div class="row">
                <a href="/">Logo</a>
                <input type="checkbox" hidden id="menu-checkbox">
                <label for="menu-checkbox" class="menu-toggle">
                    <span class="menu-lines first-line"></span>
                    <span class="menu-lines center-line"></span>
                    <span class="menu-lines last-line"></span>
                </label>
                <div class="nav-list">
                    <div class="list">
                        <a href="/">Home</a>
                        <a href="/">About</a>
                        <a href="/">blog</a>
                    </div>
                    <div class="list list-2">
                        <a href="/">Home 1</a>
                        <a href="/">About 2</a>
                        <a href="/">blog 3</a>
                        <button class="login-btn">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
